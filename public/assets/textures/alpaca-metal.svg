<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <filter id="alpaca">
    <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" seed="5" result="noise"/>
    <feColorMatrix type="matrix" values="
      0.66 0 0 0 0
      0.70 0 0 0 0
      0.72 0 0 0 0
      0 0 0 0.04 0" in="noise" result="colored"/>
    <feBlend in="SourceGraphic" in2="colored" mode="soft-light"/>
  </filter>
  <rect width="256" height="256" filter="url(#alpaca)" fill="#F7F5F0"/>
</svg>
